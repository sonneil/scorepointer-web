<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScorePointer Web</title>
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div id="app">
    <header class="toolbar">
        <div class="brand">ScorePointer Web</div>
        <label class="button">
            Load PDF
            <input id="pdfInput" type="file" accept="application/pdf" hidden />
        </label>
        <label class="button">
            Load video
            <input id="mediaFileInput" type="file" accept="video/*" hidden />
        </label>
        <div class="youtube-loader">
            <input id="youtubeUrlInput" type="url" placeholder="YouTube URL" aria-label="YouTube URL" />
            <button id="loadYoutubeButton" class="button" type="button">Load YouTube</button>
        </div>
        <button id="recordButton" class="button record" disabled>Start Recording</button>
        <div class="microphone-controls" aria-label="Microphone recording controls">
            <label class="microphone-label" for="microphoneSelect">Mic</label>
            <select id="microphoneSelect" title="Microphone for recording">
                <option value="">Default microphone</option>
            </select>
            <label class="microphone-enable" title="Enable microphone recording">
                <input id="enableMicrophoneCheckbox" type="checkbox" />
                <span>Enable microphone</span>
            </label>
        </div>
        <span id="status" class="status">Load a PDF, then enable microphone or load video to start the pointer.</span>
    </header>

    <main id="stage" class="stage">
        <section id="emptyState" class="empty-state">
            <h1>Load a PDF score</h1>
            <p>Then click on the score to place the ellipse highlight.</p>
        </section>

        <section id="pdfViewer" class="pdf-viewer hidden">
            <div id="canvasWrap" class="canvas-wrap">
                <canvas id="pdfCanvas"></canvas>
                <div id="measureHighlight" class="measure-highlight hidden"></div>
            </div>
            <div id="pageControls" class="page-controls hidden">
                <button id="previousPageButton" class="nav-button" title="Previous page">‹</button>
                <input id="pageSlider" type="range" min="1" max="1" value="1" step="1" />
                <button id="nextPageButton" class="nav-button" title="Next page">›</button>
                <span id="pageIndicator">Page 1 / 1</span>
            </div>
        </section>

        <section id="mediaPanel" class="media-panel hidden">
            <div class="media-shell">
                <video id="videoPlayer" class="media-view hidden" controls playsinline preload="auto"></video>
                <iframe id="youtubePlayer" class="media-view hidden" title="YouTube player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                <audio id="youtubeAudio" class="hidden" preload="auto" crossorigin="anonymous"></audio>
                <div class="mini-controls">
                    <button id="playButton">Play</button>
                    <button id="pauseButton">Pause</button>
                    <button id="stopButton">Stop</button>
                </div>
            </div>
        </section>

        <dialog id="microphoneDialog" class="microphone-dialog">
            <form id="microphoneDialogForm" class="microphone-dialog-card" method="dialog">
                <h2>Enable microphone recording</h2>
                <p id="microphoneDialogMessage">Allow microphone access, then select the preferred input device.</p>
                <label class="dialog-field" for="dialogMicrophoneSelect">Preferred microphone</label>
                <select id="dialogMicrophoneSelect">
                    <option value="">Default microphone</option>
                </select>
                <div class="dialog-actions">
                    <button id="microphoneDialogCancel" type="button">Cancel</button>
                    <button id="microphoneDialogConfirm" type="button" class="button">Allow microphone access</button>
                </div>
            </form>
        </dialog>

        <div id="countdown" class="countdown hidden">3</div>

    </main>
</div>

<script type="module" src="/app.js"></script>
</body>
</html>
